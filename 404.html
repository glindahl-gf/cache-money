<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Greenfly · 404</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;500;600;700&family=Oswald:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #050607;
    --bg-2: #0b0d0f;
    --bg-3: #101214;
    --accent: #B6F500;
    --accent-dim: #8bc000;
    --text: #f4f5f6;
    --dim: rgba(255,255,255,.64);
    --dim-2: rgba(255,255,255,.40);
    --hair: rgba(255,255,255,.10);
    --hair-strong: rgba(255,255,255,.20);
    --ease: cubic-bezier(.22,.61,.36,1);
    --ease-out: cubic-bezier(.16,1,.3,1);
    --max: 1440px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow Condensed', system-ui, sans-serif;
    font-weight: 400;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  body { min-height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
  a { color: inherit; text-decoration: none; }

  .mono {
    font-family: 'Oswald', sans-serif;
    font-weight: 500;
    font-size: 12px;
    letter-spacing: .22em;
    text-transform: uppercase;
  }

  /* ===== Section-light theme (canonical) ===== */
  .section-light {
    --bg:           #EEEEE8;
    --bg-2:         #E6E6DE;
    --bg-3:         #D9D9CE;
    --text:         #0F0F0F;
    --dim:          rgba(15,15,15,.62);
    --dim-2:        rgba(15,15,15,.42);
    --hair:         rgba(15,15,15,.14);
    --hair-strong:  rgba(15,15,15,.26);
    --accent:       #79982D;
    --accent-dim:   #62801F;

    background: var(--bg);
    color: var(--text);
  }
  .section-light .btn-primary { color: #fff; }
  .section-light .btn-primary:hover { background: var(--accent-dim); }
  .section-light .btn-ghost { border-color: rgba(15,15,15,.24); }
  .section-light .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

  /* ===== Fixed nav (canonical, always dark) ===== */
  .nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    padding: 18px 5vw;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background-color: transparent;
    backdrop-filter: none;
    -webkit-backdrop-filter: none;
  }
  /* Static theme: 404 never scrolls and its main is .section-light, so the
     nav element gets `nav-on-light` directly in markup. */
  .nav.nav-on-light .nav-link    { color: rgba(15,15,15,.72); }
  .nav.nav-on-light .nav-utility { color: rgba(15,15,15,.55); border-left-color: rgba(15,15,15,.18); }
  .nav.nav-on-light .nav-cta     { color: #0F0F0F; border-color: rgba(15,15,15,.28); }
  .nav.nav-on-light .nav-link:hover,
  .nav.nav-on-light .nav-utility:hover { color: #0F0F0F; }
  .nav.nav-on-light .nav-cta:hover     { background: var(--accent); color: #000; border-color: var(--accent); }
  /* Logo recolor on light bg: hide the lime original and paint a
     field-green wordmark on the parent anchor via background-image. */
  .nav.nav-on-light .nav-logo {
    background-image: url('./images/brand/Greenfly-fieldgreen.svg');
    background-size: contain;
    background-repeat: no-repeat;
    background-position: left center;
  }
  .nav.nav-on-light .nav-logo img { visibility: hidden; }
  .nav-left, .nav-right { display: flex; align-items: center; gap: 28px; }
  .nav-right { gap: 24px; }
  .nav-links { display: flex; align-items: center; gap: 28px; }
  .nav-utility {
    display: inline-flex;
    align-items: center;
    font-family: 'Oswald', sans-serif;
    font-weight: 500;
    font-size: 12px;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: rgba(255,255,255,.40);
    padding-left: 22px;
    border-left: 1px solid rgba(255,255,255,.10);
    transition: color .2s var(--ease);
  }
  .nav-utility:hover { color: #f4f5f6; }
  .nav-logo { display: inline-flex; align-items: center; line-height: 1; }
  .nav-logo img { height: 22px; width: auto; display: block; }
  .nav-link {
    font-size: 13px;
    color: rgba(255,255,255,.64);
    transition: color .2s var(--ease);
  }
  .nav-link:hover { color: #f4f5f6; }
  .nav-cta {
    padding: 9px 16px;
    border: 1px solid rgba(255,255,255,.20);
    border-radius: 8px;
    color: #f4f5f6;
    font-size: 13px;
    font-weight: 500;
    transition: background .2s var(--ease), color .2s var(--ease), border-color .2s var(--ease);
  }
  .nav-cta:hover { background: #B6F500; color: #000; border-color: #B6F500; }

  /* Solutions dropdown */
  .nav-link-wrap { position: relative; }
  .nav-link-wrap .nav-link { display: inline-flex; align-items: center; gap: 7px; }
  .nav-link-wrap .nav-link::after {
    content: ""; display: inline-block;
    width: 5px; height: 5px;
    border-right: 1px solid currentColor;
    border-bottom: 1px solid currentColor;
    transform: rotate(45deg) translateY(-1px);
    opacity: .55;
    transition: transform .25s var(--ease), opacity .2s var(--ease);
  }
  .nav-link-wrap:hover .nav-link::after,
  .nav-link-wrap:focus-within .nav-link::after {
    opacity: 1;
    transform: rotate(225deg) translateY(1px);
  }
  .nav-dropdown {
    position: absolute;
    top: calc(100% + 14px);
    left: 50%;
    transform: translateX(-50%) translateY(-4px);
    min-width: 200px;
    background: #0b0d0f;
    border: 1px solid rgba(255,255,255,.10);
    padding: 8px 0;
    opacity: 0; visibility: hidden;
    transition: opacity .18s var(--ease), transform .18s var(--ease), visibility 0s .18s;
    z-index: 110;
  }
  .nav-dropdown::before {
    content: ""; position: absolute;
    top: -14px; left: 0; right: 0; height: 14px;
  }
  .nav-link-wrap:hover .nav-dropdown,
  .nav-link-wrap:focus-within .nav-dropdown {
    opacity: 1; visibility: visible;
    transform: translateX(-50%) translateY(0);
    transition: opacity .18s var(--ease), transform .18s var(--ease);
  }
  .nav-dd-item {
    display: block;
    padding: 9px 22px;
    font-size: 13px;
    color: rgba(255,255,255,.64);
    white-space: nowrap;
    transition: color .15s var(--ease);
  }
  .nav-dd-item:hover { color: #B6F500; }

  /* ===== Buttons (canonical) ===== */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 14px 22px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: .01em;
    transition: transform .2s var(--ease), background .2s var(--ease), color .2s var(--ease), border-color .2s var(--ease);
  }
  .btn-primary { background: var(--accent); color: #000; }
  .btn-primary:hover { transform: translateY(-1px); background: #c8ff1a; }
  .btn .arrow { transition: transform .2s var(--ease); }
  .btn:hover .arrow { transform: translateX(3px); }

  /* ===== STAGE — full viewport canvas ===== */
  .stage {
    position: relative;
    flex: 1;
    width: 100%;
    overflow: hidden;
    cursor: crosshair;
  }

  /* ===== CENTER — the giant 404 + supporting line ===== */
  .center {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 28px;
    pointer-events: none;
    z-index: 2;
  }

  .message {
    font-family: 'Barlow Condensed', system-ui, sans-serif;
    font-weight: 400;
    font-size: clamp(16px, 1.4vw, 19px);
    color: var(--dim);
    text-align: center;
    max-width: 64ch;
    padding: 0 5vw;
  }

  .four-zero-four {
    font-family: 'Oswald', sans-serif;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: -0.018em;
    line-height: .82;
    font-size: clamp(180px, 28vw, 480px);
    color: var(--text);
    font-variant-numeric: tabular-nums;
    display: flex;
    align-items: center;
    gap: 0;
    user-select: none;
  }
  .four-zero-four .digit { display: inline-block; }

  /* The 0 is a swappable ball — interactive */
  .ball-zero {
    position: relative;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 1em;
    height: 1em;
    pointer-events: auto;
    cursor: grab;
    transform: translateZ(0);
  }
  .ball-zero:active { cursor: grabbing; }
  .ball-zero.spinning .ball-img { animation: spin 1.2s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .ball-img {
    width: 88%;
    height: 88%;
    object-fit: contain;
    transition: transform .7s var(--ease-out), opacity .55s var(--ease-out);
    transform-origin: center;
  }
  .ball-zero:hover .ball-img { transform: scale(1.04); }

  /* Cross-fade between ball types */
  .ball-img.swap-out { opacity: 0; transform: scale(.9) rotate(-12deg); }
  .ball-img.swap-in  { opacity: 0; transform: scale(.9) rotate(12deg); }

  /* Hover halo around the ball */
  .ball-zero::after {
    content: "";
    position: absolute; inset: -10%;
    border: 1px dashed var(--accent);
    border-radius: 50%;
    opacity: 0;
    transition: opacity .25s var(--ease);
    animation: rotate 18s linear infinite;
  }
  .ball-zero:hover::after,
  .ball-zero.spinning::after { opacity: .55; }
  @keyframes rotate { to { transform: rotate(360deg); } }

  /* ===== BOTTOM bar — counter + CTA ===== */
  .bottom {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    z-index: 5;
    padding: 22px 5vw 26px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 24px;
    flex-wrap: wrap;
    border-top: 1px solid var(--hair);
    background: linear-gradient(to top, rgba(238,238,232,.9), rgba(238,238,232,0));
    backdrop-filter: blur(2px);
    -webkit-backdrop-filter: blur(2px);
  }
  .counter {
    display: inline-flex;
    align-items: baseline;
    gap: 14px;
    color: var(--dim);
  }
  .counter .ix { color: var(--accent); }
  .counter b {
    color: var(--text);
    font-family: 'Oswald', sans-serif;
    font-weight: 500;
    font-size: 22px;
    letter-spacing: -.012em;
    font-variant-numeric: tabular-nums;
    min-width: 2ch;
    display: inline-block;
  }

  /* ===== Live balls / trails (DOM-based) ===== */
  .ball-live {
    position: absolute;
    width: 44px; height: 44px;
    z-index: 4;
    pointer-events: none;
    will-change: transform;
  }
  .ball-live img { width: 100%; height: 100%; object-fit: contain; }

  .trail-dot {
    position: absolute;
    width: 4px; height: 4px;
    background: var(--accent);
    opacity: .55;
    z-index: 3;
    pointer-events: none;
    transition: opacity .8s linear, transform .8s linear;
  }

  /* "Nice arm." / "Home run." popups */
  .pop {
    position: absolute;
    z-index: 6;
    font-family: 'Oswald', sans-serif;
    font-weight: 600;
    text-transform: uppercase;
    font-size: 28px;
    letter-spacing: -0.012em;
    color: var(--accent);
    pointer-events: none;
    transform: translate(-50%, -50%);
    animation: popUp 1.1s var(--ease-out) forwards;
    white-space: nowrap;
  }
  .pop em {
    font-style: normal;
    color: var(--accent);
    font-weight: 600;
  }
  @keyframes popUp {
    0%   { opacity: 0; transform: translate(-50%, -40%) scale(.7); }
    20%  { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    80%  { opacity: 1; }
    100% { opacity: 0; transform: translate(-50%, -90%) scale(1); }
  }

  @media (max-width: 720px) {
    .nav-links { display: none; }
    .nav-utility { display: none; }
    .bottom { padding: 18px 5vw 22px; }
  }
</style>
</head>
<body>

<nav class="nav nav-on-light" id="siteNav">
  <div class="nav-left">
    <a href="./homepage.html" class="nav-logo" aria-label="Greenfly">
      <img src="./images/brand/Greenfly (1).svg" alt="Greenfly">
    </a>
  </div>
  <div class="nav-right">
    <div class="nav-links">
      <a href="./platform.html"  class="nav-link">Platform</a>
      <div class="nav-link-wrap">
        <a href="./solutions.html" class="nav-link">Solutions</a>
        <div class="nav-dropdown">
          <a href="./solutions-sports.html" class="nav-dd-item">Sports</a>
          <a href="./solutions-entertainment.html" class="nav-dd-item">Entertainment</a>
          <a href="./solutions-brands.html" class="nav-dd-item">Brands</a>
          <a href="./solutions-live-events.html" class="nav-dd-item">Live Events</a>
        </div>
      </div>
      <a href="./homepage.html#proof" class="nav-link">Stories</a>

    </div>
    <a href="#login" class="nav-utility">Login</a>
    <a href="./get-greenfly.html"  class="nav-cta">Get Greenfly</a>
  </div>
</nav>

<main class="stage section-light" id="stage">

  <div class="center">
    <div class="four-zero-four">
      <span class="digit">4</span>
      <span class="ball-zero" id="ballZero" role="button" aria-label="Shuffle the ball">
        <img class="ball-img" id="ballImg" src="./images/404/baseball-1.svg" alt="" draggable="false" />
      </span>
      <span class="digit">4</span>
    </div>
    <p class="message">We can't find the page you're looking for. It may have moved, or the link you followed is no longer valid.</p>
  </div>

  <div class="bottom">
    <div class="counter mono">
      <span>Pitches thrown</span>
      <b id="pitchCount">0</b>
    </div>
    <a href="./homepage.html" class="btn btn-primary">Back to home <span class="arrow">→</span></a>
  </div>

</main>

<script>
(() => {
  const stage      = document.getElementById('stage');
  const ballZero   = document.getElementById('ballZero');
  const ballImg    = document.getElementById('ballImg');
  const counterEl  = document.getElementById('pitchCount');

  const BALLS = [
    './images/404/baseball-1.svg',
    './images/404/basketball-1.svg',
    './images/404/tennis-ball.svg',
    './images/404/american-football.svg',
    './images/404/rugby.svg',
    './images/404/golf.svg',
    './images/404/punch.svg',
  ];

  // Preload so swaps don't flash blank
  BALLS.forEach(src => { const i = new Image(); i.src = src; });

  let centerIndex = 0;
  let pitches = 0;

  // ====== Center-ball shuffling ======
  function nextCenterBall() {
    centerIndex = (centerIndex + 1) % BALLS.length;
    swapCenterBall(BALLS[centerIndex]);
  }

  function swapCenterBall(src) {
    ballImg.classList.add('swap-out');
    setTimeout(() => {
      ballImg.src = src;
      ballImg.classList.remove('swap-out');
      ballImg.classList.add('swap-in');
      requestAnimationFrame(() => requestAnimationFrame(() => {
        ballImg.classList.remove('swap-in');
      }));
    }, 550);
  }

  // Auto-cycle the center ball every 4.5s for a calmer rhythm
  const CYCLE_MS = 4500;
  let autoCycleTimer = setInterval(nextCenterBall, CYCLE_MS);
  let resumeTimeout = null;
  function pauseAutoCycle(forMs = 6000) {
    clearInterval(autoCycleTimer);
    clearTimeout(resumeTimeout);
    resumeTimeout = setTimeout(() => {
      autoCycleTimer = setInterval(nextCenterBall, CYCLE_MS);
    }, forMs);
  }

  function randomBall() {
    return BALLS[Math.floor(Math.random() * BALLS.length)];
  }

  // ====== Counter ======
  function bumpCounter() {
    pitches++;
    counterEl.textContent = pitches;
    if (pitches === 5)  showPop('Nice arm.', window.innerWidth/2, window.innerHeight*0.3);
    if (pitches === 12) showPop('That’s a strike.', window.innerWidth/2, window.innerHeight*0.3);
    if (pitches === 25) showPop('Home run.', window.innerWidth/2, window.innerHeight*0.3);
    if (pitches === 50) showPop('OK calm down.', window.innerWidth/2, window.innerHeight*0.3);
  }

  // ====== Click anywhere to launch a ball ======
  stage.addEventListener('click', (e) => {
    if (e.target.closest('.btn') || e.target.closest('.nav') || e.target.closest('.ball-zero')) return;
    launchBall(e.clientX, e.clientY);
  });

  function launchBall(targetX, targetY) {
    bumpCounter();

    const fromLeft = Math.random() > 0.5;
    const startX = fromLeft ? -60 : window.innerWidth + 60;
    const startY = window.innerHeight - 60 + (Math.random()*20);
    const src = randomBall();

    const ball = document.createElement('div');
    ball.className = 'ball-live';
    const img = document.createElement('img');
    img.src = src; img.alt = ''; img.draggable = false;
    ball.appendChild(img);
    ball.style.left = startX + 'px';
    ball.style.top  = startY + 'px';
    stage.appendChild(ball);

    const dx = targetX - startX;
    const dy = targetY - startY;
    const distance = Math.hypot(dx, dy);
    const duration = Math.min(900, 350 + distance * 0.4);
    const startTime = performance.now();
    const peakBoost = Math.max(80, distance * 0.25);
    let lastTrailTime = 0;

    function frame(now) {
      const t = Math.min(1, (now - startTime) / duration);
      const ease = 1 - Math.pow(1 - t, 1.6);

      const x = startX + dx * ease;
      const y = startY + dy * ease - Math.sin(ease * Math.PI) * peakBoost;
      const rot = ease * 720 * (fromLeft ? 1 : -1);

      ball.style.transform = `translate(${x - startX}px, ${y - startY}px) rotate(${rot}deg)`;

      if (now - lastTrailTime > 28) {
        spawnTrail(x + 22, y + 22);
        lastTrailTime = now;
      }

      if (t < 1) {
        requestAnimationFrame(frame);
      } else {
        burst(targetX, targetY);
        ball.style.transition = 'opacity .35s ease, transform .35s ease';
        ball.style.opacity = '0';
        setTimeout(() => ball.remove(), 400);
      }
    }
    requestAnimationFrame(frame);
  }

  function spawnTrail(x, y) {
    const d = document.createElement('div');
    d.className = 'trail-dot';
    d.style.left = (x - 2) + 'px';
    d.style.top  = (y - 2) + 'px';
    stage.appendChild(d);
    requestAnimationFrame(() => {
      d.style.opacity = '0';
      d.style.transform = `translate(${(Math.random()-.5)*12}px, ${(Math.random()-.5)*12}px) scale(.4)`;
    });
    setTimeout(() => d.remove(), 900);
  }

  function burst(x, y) {
    for (let i = 0; i < 6; i++) {
      const d = document.createElement('div');
      d.className = 'trail-dot';
      d.style.left = (x - 2) + 'px';
      d.style.top  = (y - 2) + 'px';
      if (i % 2 === 0) d.style.background = 'currentColor';
      stage.appendChild(d);
      const angle = (i / 6) * Math.PI * 2;
      const dist = 22 + Math.random()*16;
      requestAnimationFrame(() => {
        d.style.opacity = '0';
        d.style.transform = `translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px) scale(.3)`;
      });
      setTimeout(() => d.remove(), 700);
    }
  }

  function showPop(text, x, y) {
    const p = document.createElement('div');
    p.className = 'pop';
    p.style.left = x + 'px';
    p.style.top  = y + 'px';
    p.textContent = text;
    stage.appendChild(p);
    setTimeout(() => p.remove(), 1200);
  }

  // ====== Click the central ball: shuffle + spin + launch ======
  let spinTimeout;
  ballZero.addEventListener('click', (e) => {
    e.stopPropagation();
    bumpCounter();

    nextCenterBall();
    pauseAutoCycle(4500);

    ballZero.classList.add('spinning');
    clearTimeout(spinTimeout);
    spinTimeout = setTimeout(() => ballZero.classList.remove('spinning'), 1200);

    const rect = ballZero.getBoundingClientRect();
    const cx = rect.left + rect.width/2;
    const cy = rect.top + rect.height/2;
    const tx = Math.random() * window.innerWidth;
    const ty = Math.random() * window.innerHeight * 0.5 + 60;
    launchBallFrom(cx, cy, tx, ty);
  });

  function launchBallFrom(startX, startY, targetX, targetY) {
    const ball = document.createElement('div');
    ball.className = 'ball-live';
    const img = document.createElement('img');
    img.src = randomBall(); img.alt = ''; img.draggable = false;
    ball.appendChild(img);
    ball.style.left = startX + 'px';
    ball.style.top  = startY + 'px';
    stage.appendChild(ball);

    const dx = targetX - startX;
    const dy = targetY - startY;
    const distance = Math.hypot(dx, dy);
    const duration = Math.min(900, 350 + distance * 0.4);
    const startTime = performance.now();
    const peakBoost = Math.max(60, distance * 0.2);
    let lastTrailTime = 0;

    function frame(now) {
      const t = Math.min(1, (now - startTime) / duration);
      const ease = 1 - Math.pow(1 - t, 1.6);
      const x = startX + dx * ease;
      const y = startY + dy * ease - Math.sin(ease * Math.PI) * peakBoost;
      const rot = ease * 540;
      ball.style.transform = `translate(${x - startX}px, ${y - startY}px) rotate(${rot}deg)`;
      if (now - lastTrailTime > 28) {
        spawnTrail(x + 22, y + 22);
        lastTrailTime = now;
      }
      if (t < 1) requestAnimationFrame(frame);
      else {
        burst(targetX, targetY);
        ball.style.transition = 'opacity .35s ease';
        ball.style.opacity = '0';
        setTimeout(() => ball.remove(), 400);
      }
    }
    requestAnimationFrame(frame);
  }

  // ====== Drag-throw the central ball ======
  let dragging = false;
  let dragStart = null;
  let dragOrigin = null;

  ballZero.addEventListener('pointerdown', (e) => {
    e.preventDefault();
    e.stopPropagation();
    dragging = true;
    const rect = ballZero.getBoundingClientRect();
    dragOrigin = { x: rect.left + rect.width/2, y: rect.top + rect.height/2 };
    dragStart  = { x: e.clientX, y: e.clientY };
    ballZero.setPointerCapture(e.pointerId);
    ballImg.style.transition = 'transform .05s linear';
  });
  ballZero.addEventListener('pointermove', (e) => {
    if (!dragging) return;
    const dx = e.clientX - dragStart.x;
    const dy = e.clientY - dragStart.y;
    const drag = Math.min(40, Math.hypot(dx, dy));
    const angle = Math.atan2(dy, dx);
    ballImg.style.transform = `translate(${Math.cos(angle)*drag*0.4}px, ${Math.sin(angle)*drag*0.4}px) rotate(${drag*4}deg)`;
  });
  ballZero.addEventListener('pointerup', (e) => {
    if (!dragging) return;
    dragging = false;
    const dx = e.clientX - dragStart.x;
    const dy = e.clientY - dragStart.y;
    ballImg.style.transition = 'transform .55s var(--ease-out)';
    ballImg.style.transform = '';

    if (Math.hypot(dx, dy) > 14) {
      const throwLen = Math.min(900, Math.hypot(dx, dy) * 6);
      const angle = Math.atan2(dy, dx);
      const tx = dragOrigin.x + Math.cos(angle) * throwLen;
      const ty = dragOrigin.y + Math.sin(angle) * throwLen;
      bumpCounter();
      nextCenterBall();
      pauseAutoCycle(4500);
      launchBallFrom(dragOrigin.x, dragOrigin.y, tx, ty);
    }
  });

  // ====== Idle "auto-pitch" once after 8s if no interaction ======
  setTimeout(() => {
    if (pitches === 0) {
      launchBall(window.innerWidth/2, window.innerHeight/2);
    }
  }, 8000);
})();
</script>
