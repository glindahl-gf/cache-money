<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Automate · Rosette</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;500;600;700&family=Oswald:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
<style>
:root {
  --bg:           #EEEEE8;
  --hex-fill:     #E4E4DC;
  --num:          #B4CD6A;
  --text:         #10181F;
  --text-dim:     #646461;
  --olive:        #79982D;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Barlow Condensed', system-ui, sans-serif;
  font-weight: 400;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}
em, i { font-style: normal; }

.stage {
  width: 1200px;
  height: 900px;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 60px;
}

/* loop rosette (Automate) ------------------------------------- */
.loop-rosette {
  position: relative;
  width: 100%;
  max-width: 760px;
  margin: 0 auto;
  aspect-ratio: 1 / 1;
}
.rosette-svg {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  overflow: visible;
}

/* hex tiles — solid beige fill, white outline on all seven */
.rosette-hex {
  fill: var(--hex-fill);
  stroke: #FFFFFF;
  stroke-width: 2;
  stroke-linejoin: miter;
}
.rosette-hex--center {
  fill: none;
  stroke: #FFFFFF;
  stroke-width: 2;
}

/* signal dots — colors set per-circle via inline fill attributes */
.rosette-signal--static { display: none; }
@media (prefers-reduced-motion: reduce) {
  .rosette-signal--motion { display: none; }
  .rosette-signal--static { display: block; }
}

/* HTML overlay */
.rosette-overlay {
  position: absolute; inset: 0;
  pointer-events: none;
}

.rosette-center-content {
  position: absolute;
  left: 50%; top: 50%;
  transform: translate(-50%, -50%);
  display: flex;
  align-items: center; justify-content: center;
  width: 22%;
}
/* render the logo file as a mask so the color is controlled via CSS */
.rosette-center-content .rosette-mark {
  display: block;
  width: 100%;
  aspect-ratio: 290 / 58;
  background-color: var(--olive);
  -webkit-mask: url('./images/platform/automate/greenfly-logo.svg') no-repeat center / contain;
          mask: url('./images/platform/automate/greenfly-logo.svg') no-repeat center / contain;
}

/* step label — sage number with verb stack underneath */
.rosette-step {
  position: absolute;
  transform: translate(-50%, -50%);
  width: 22%;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 12px;
  text-align: center;
}
.rosette-step .rosette-num {
  font-family: 'Oswald', sans-serif;
  font-weight: 600;
  font-size: 28px;
  line-height: 1;
  color: var(--num);
  letter-spacing: -0.01em;
}
.rosette-step .rosette-verb {
  font-family: 'Oswald', sans-serif;
  font-weight: 600;
  font-size: 13px;
  letter-spacing: .18em;
  text-transform: uppercase;
  line-height: 1.02;
  color: var(--text-dim);
}
.rosette-step .rosette-verb + .rosette-verb { margin-top: 0; }
</style>
</head>
<body>

<div class="stage">
  <div class="loop-rosette" id="automateRosette" role="img"
       aria-label="Greenfly content lifecycle — six steps around a central platform"></div>
</div>

<script>
(() => {
  const root = document.getElementById('automateRosette');
  if (!root) return;

  const r  = 140;
  const cx = 500, cy = 500;
  const D  = r * Math.sqrt(3);

  const flatTopHex = (cx, cy, r) => {
    const h = r * Math.sqrt(3) / 2;
    return [
      [cx + r,     cy        ],
      [cx + r / 2, cy + h    ],
      [cx - r / 2, cy + h    ],
      [cx - r,     cy        ],
      [cx - r / 2, cy - h    ],
      [cx + r / 2, cy - h    ],
    ];
  };
  const pointsStr = pts => pts.map(p => p.join(',')).join(' ');

  const angles = [-90, -30, 30, 90, 150, 210];
  const centers = angles.map(deg => {
    const rad = deg * Math.PI / 180;
    return { x: cx + D * Math.cos(rad), y: cy + D * Math.sin(rad) };
  });

  const centerVerts = flatTopHex(cx, cy, r);

  const steps = [
    { number: '1', verbs: ['Collect'] },
    { number: '2', verbs: ['Identify', 'Tag', 'Organize'] },
    { number: '3', verbs: ['Distribute'] },
    { number: '4', verbs: ['Activate'] },
    { number: '5', verbs: ['Measure'] },
    { number: '6', verbs: ['Automate'] },
  ];

  const centerLogo = `<span class="rosette-mark" role="img" aria-label="Greenfly"></span>`;

  let svg = `<svg class="rosette-svg" viewBox="0 0 1000 1000" aria-hidden="true">`;

  svg += `<polygon class="rosette-hex rosette-hex--center" points="${pointsStr(centerVerts)}"/>`;

  centers.forEach((c, i) => {
    const pts = pointsStr(flatTopHex(c.x, c.y, r));
    svg += `<polygon class="rosette-hex rosette-hex--step" data-i="${i}" points="${pts}"/>`;
  });

  const centerPath = `M ${centerVerts[0][0]} ${centerVerts[0][1]}
                      L ${centerVerts[1][0]} ${centerVerts[1][1]}
                      L ${centerVerts[2][0]} ${centerVerts[2][1]}
                      L ${centerVerts[3][0]} ${centerVerts[3][1]}
                      L ${centerVerts[4][0]} ${centerVerts[4][1]}
                      L ${centerVerts[5][0]} ${centerVerts[5][1]} Z`;
  svg += `
    <g class="rosette-signal rosette-signal--motion">
      <circle r="7" fill="#336A29">
        <animateMotion dur="18s" begin="0s" repeatCount="indefinite" rotate="auto"
                       path="${centerPath}"/>
      </circle>
      <circle r="5.5" fill="#659B3F">
        <animateMotion dur="18s" begin="-6s" repeatCount="indefinite" rotate="auto"
                       path="${centerPath}"/>
      </circle>
      <circle r="4" fill="#C1D95C">
        <animateMotion dur="18s" begin="-12s" repeatCount="indefinite" rotate="auto"
                       path="${centerPath}"/>
      </circle>
    </g>
    <g class="rosette-signal rosette-signal--static" aria-hidden="true">
      <circle r="7"   fill="#336A29"
              cx="${centerVerts[0][0]}" cy="${centerVerts[0][1]}"/>
      <circle r="5.5" fill="#659B3F"
              cx="${centerVerts[2][0]}" cy="${centerVerts[2][1]}"/>
      <circle r="4"   fill="#C1D95C"
              cx="${centerVerts[4][0]}" cy="${centerVerts[4][1]}"/>
    </g>`;

  svg += `</svg>`;

  let overlay = `<div class="rosette-overlay">`;
  overlay += `<div class="rosette-center-content" aria-hidden="true">${centerLogo}</div>`;
  steps.forEach((step, i) => {
    const c = centers[i];
    const left = (c.x / 10).toFixed(3);
    const top  = (c.y / 10).toFixed(3);
    const verbHtml = step.verbs.map(v => `<span class="rosette-verb">${v}</span>`).join('');
    overlay += `
      <div class="rosette-step" data-i="${i}"
           style="left:${left}%;top:${top}%">
        <span class="rosette-num">${step.number}</span>
        ${verbHtml}
      </div>`;
  });
  overlay += `</div>`;

  root.innerHTML = svg + overlay;
})();
</script>

</body>
</html>
